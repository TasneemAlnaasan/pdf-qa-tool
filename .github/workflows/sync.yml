name: Sync to Hugging Face Spaces

on:
  push:
    branches: [study-buddy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://Tsneemk:$HF_TOKEN@huggingface.co/spaces/Tsneemk/study-buddy HEAD:main