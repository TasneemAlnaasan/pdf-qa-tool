name: Sync to Hugging Face Spaces

on:
  push:
    # هنا نحدد اسم فرعك المطور لكي يتم الرفع منه فقط (استبدل feature-branch باسم فرعك الحالي)
    branches: [feature-branch]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          # هنا نربط الحسابين بالـ Token السري
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # استبدل USERNAME باسم حسابك في هقنق فيس، و SPACE_NAME باسم الـ Space الذي أنشأته
          git push --force https://writingcontent:$HF_TOKEN@huggingface.co/spaces/writingcontent/study-buddy HEAD:main